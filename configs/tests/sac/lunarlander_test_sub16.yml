# SAC-PBER: BOX2DV-LunarLanderContinuous
# 🧪 TEST: sub_buffer_size=16 with aligned train_batch_size
extends: ../../templates/sac_vector_base.yml

env_config:
  env_name: "BOX2DV-LunarLanderContinuous"
  env_alias: "SAC-PBER-LunarLander-sub16"

logging:
  log_subdir: "BOX2DV/LunarLander-PBER-sub16"

mlflow:
  experiment: "SAC-LunarLander-sub16-test"
  tags:
    algorithm: "SAC"
    buffer: "PBER"
    environment: "LunarLander"
    obs_type: "vector"
    compression: "none"
    test: "sub_buffer_size_16_aligned"

run_config:
  max_time_s: 1800  # 30 minutes test

hyper_parameters:
  train_batch_size: 256
  rollout_fragment_length: 1
  min_sample_timesteps_per_iteration: 2000
  training_intensity: 2.0

  # Replay buffer (PBER: sub_buffer_size=16 with aligned batch size)
  replay_buffer_config:
    capacity: 1000000  # 1M transitions
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16  # 🎯 KEY CHANGE: 16 with aligned train_batch_size
    worker_side_prioritization: false

  # Resource
  num_workers: 6
  num_envs_per_worker: 8
