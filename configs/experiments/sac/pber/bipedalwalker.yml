# SAC-PBER: BOX2DV-BipedalWalker (Vector observation)
extends: ../../../templates/sac_vector_base.yml

env_config:
  env_name: "BOX2DV-BipedalWalker"
  env_alias: "SAC-PBER-BipedalWalker"

logging:
  log_subdir: "BOX2DV/BipedalWalker-PBER"

mlflow:
  experiment: "SAC-BipedalWalker"
  tags:
    algorithm: "SAC"
    buffer: "PBER"
    environment: "BipedalWalker"
    obs_type: "vector"

run_config:
  max_time_s: 72000

hyper_parameters:
  train_batch_size: 512
  min_sample_timesteps_per_iteration: 4000
  training_intensity: 4.0

  # Replay buffer (PBER: Block-based without compression)
  replay_buffer_config:
    capacity: 5000000
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16

  # Resource
  num_workers: 6
  num_envs_per_worker: 8