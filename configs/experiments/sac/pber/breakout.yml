# SAC-PBER: Atari-Breakout (Image observation)
# PBER = Block Experience Replay without compression
extends: ../../../templates/sac_image_base.yml

env_config:
  env_name: "Atari-Breakout"
  env_alias: "SAC-PBER-Breakout"

logging:
  log_subdir: "Atari/Breakout-PBER"

mlflow:
  experiment: "SAC-Breakout"
  tags:
    algorithm: "SAC"
    buffer: "PBER"
    environment: "Breakout"
    obs_type: "image"

run_config:
  max_time_s: 360000

hyper_parameters:
  train_batch_size: 256
  min_sample_timesteps_per_iteration: 10000
  training_intensity: 3.0
  target_entropy: -3.0

  # Replay buffer (PBER: Block-based without compression)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16
    worker_side_prioritization: false

  # Resource
  num_workers: 3
  num_envs_per_worker: 8

