# SAC-PBER: Atari-Breakout (Image observation)
# PBER = Block Experience Replay without compression
extends: ../../../templates/sac_image_base.yml

env_config:
  id: "Atari-BreakoutNoFrameskip-v4"
  env_alias: "SAC-PBER-Breakout"

logging:
  log_subdir: "Atari/Breakout"

mlflow:
  experiment: "SAC-Atari-Breakout"
  tags:
    algorithm: "SAC"
    buffer: "PBER"
    environment: "Breakout"
    obs_type: "image"

run_config:
  max_time_s: 600

hyper_parameters:
  train_batch_size: 512
  grad_clip: 1.0
  n_step: 3
  rollout_fragment_length: 8
  initial_alpha: 0.05
  lr: 1.e-4
  optimization:
    actor_learning_rate: 1.e-4
    critic_learning_rate: 1.e-4
    entropy_learning_rate: 1.e-4

  min_sample_timesteps_per_iteration: 15000
  training_intensity: 1.0
  target_entropy: auto

  # Replay buffer (PBER: Block-based without compression)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16
    worker_side_prioritization: true

  # Resource
  num_workers: 8
  num_cpus: 10
  num_envs_per_worker: 8