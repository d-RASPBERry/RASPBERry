# SAC-PBER: GYM-Walker2d-v4 (Vector observation, MuJoCo)
# PBER = Block Experience Replay without compression (RASPBERry中间态)
extends: ../../../templates/sac_vector_base.yml

env_config:
  env_name: "GYM-Walker2d"
  env_alias: "SAC-PBER-Walker2d"

logging:
  log_subdir: "MuJoCo/Walker2d-PBER"

mlflow:
  experiment: "SAC-Walker2d"
  tags:
    algorithm: "SAC"
    buffer: "PBER"
    environment: "Walker2d"
    obs_type: "vector"
    framework: "MuJoCo"
    compression: "none"

run_config:
  max_time_s: 86400

hyper_parameters:
  train_batch_size: 512
  min_sample_timesteps_per_iteration: 2000
  training_intensity: 2.0

  # Replay buffer (PBER: Block-based without compression)
  replay_buffer_config:
    capacity: 5000000
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 32
    compress_base: -1
    worker_side_prioritization: false
    compress_pool_size: 0  # 不使用（Mode C不需要）
    compression_algorithm: "lz4"  # 不使用（Mode C不压缩）
    compression_level: 1  # 不使用（Mode C不压缩）
    compression_nthreads: 4  # 不使用（Mode C不压缩）
    compression_mode: "C"  # Mode C = PBER (无压缩)
    chunk_size: 20

  # Resource
  num_workers: 6
  num_envs_per_worker: 8