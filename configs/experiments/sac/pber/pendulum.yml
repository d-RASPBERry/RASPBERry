# SAC-PBER: Pendulum-Pendulum (Image observation)
# PBER = Block Experience Replay without compression (RASPBERry中间态)
extends: ../../../templates/sac_image_base.yml

env_config:
  env_name: "Pendulum-Pendulum"
  env_alias: "SAC-PBER-Pendulum"

logging:
  log_subdir: "Pendulum/Pendulum-PBER"

mlflow:
  experiment: "SAC-Pendulum"
  tags:
    algorithm: "SAC"
    buffer: "PBER"
    environment: "Pendulum"
    obs_type: "image"

run_config:
  max_time_s: 360000

hyper_parameters:
  train_batch_size: 128
  min_sample_timesteps_per_iteration: 4000
  training_intensity: 6.0

  # Replay buffer (PBER: Block-based without compression)
  replay_buffer_config:
    capacity: 100000
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16
    worker_side_prioritization: false

  # Resource
  num_workers: 2
  num_envs_per_worker: 8