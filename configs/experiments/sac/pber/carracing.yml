# SAC-PBER: BOX2DI-CarRacing (Image observation)
# PBER = Block Experience Replay without compression (Chapter 3: PBER)
extends: ../../../templates/sac_image_base.yml

env_config:
  env_name: "BOX2DI-CarRacing"
  env_alias: "SAC-PBER-CarRacing"
  normalize: false
  dtype: "uint8"

logging:
  log_subdir: "BOX2DI/CarRacing-PBER"

mlflow:
  experiment: "SAC-CarRacing"
  tags:
    algorithm: "SAC"
    buffer: "PBER"
    environment: "CarRacing"
    obs_type: "image"

run_config:
  max_time_s: 360000

hyper_parameters:
  train_batch_size: 512
  grad_clip: 1.0
  n_step: 3
  rollout_fragment_length: 8
  initial_alpha: 0.05
  optimization:
    actor_learning_rate: 0.0001
    critic_learning_rate: 0.0001
    entropy_learning_rate: 0.0001

  min_sample_timesteps_per_iteration: 15000
  training_intensity: 3.0
  target_entropy: -3.0

  # Replay buffer (PBER: Block-based without compression)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 32  # Transitions per block

  # Resource
  num_workers: 9
  num_cpus: 10
  num_envs_per_worker: 8