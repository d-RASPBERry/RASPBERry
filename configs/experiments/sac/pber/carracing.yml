# SAC-PBER: BOX2DI-CarRacing (Image observation)
# PBER = Block Experience Replay without compression (Chapter 3: PBER)
extends: ../../../templates/sac_image_base.yml

env_config:
  env_name: "BOX2DI-CarRacing"
  env_alias: "SAC-PBER-CarRacing"

logging:
  log_subdir: "BOX2DI/CarRacing-PBER"

mlflow:
  experiment: "SAC-CarRacing"
  tags:
    algorithm: "SAC"
    buffer: "PBER"
    environment: "CarRacing"
    obs_type: "image"
    compression: "none"

run_config:
  max_time_s: 360000

hyper_parameters:
  train_batch_size: 128
  min_sample_timesteps_per_iteration: 2000
  training_intensity: 2.0

  # Replay buffer (PBER: Block-based without compression)
  replay_buffer_config:
    # Standard PER parameters
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    worker_side_prioritization: false
    
    # PBER-specific parameters
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16  # Transitions per block

  # Resource
  num_workers: 3
  num_envs_per_worker: 8