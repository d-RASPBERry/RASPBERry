# SAC-PBER: BOX2DV-LunarLanderContinuous
# PBER = Block Experience Replay without compression baseline
extends: ../../../templates/sac_vector_base.yml

env_config:
  id: "BOX2DV-LunarLanderContinuous"
  env_alias: "SAC-PBER-LunarLander"

logging:
  log_subdir: "BOX2DV/LunarLander"

mlflow:
  experiment: "SAC-LunarLander"
  tags:
    algorithm: "SAC"
    buffer: "PBER"
    environment: "LunarLander"
    obs_type: "vector"

run_config:
  use_mlflow: true
  max_time_s: 360000

hyper_parameters:
  train_batch_size: 512
  min_sample_timesteps_per_iteration: 2000

  # Replay buffer (PBER: Block-based without compression)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16
    worker_side_prioritization: true

  # Resource
  num_workers: 8
  num_envs_per_worker: 8