# SAC-PER: BOX2DV-BipedalWalker (Vector observation)
extends: ../../../templates/sac_vector_base.yml

env_config:
  env_name: "BOX2DV-BipedalWalker"
  env_alias: "SAC-PER-BipedalWalker"

logging:
  log_subdir: "BOX2DV/BipedalWalker"

mlflow:
  experiment: "SAC-BipedalWalker"
  tags:
    algorithm: "SAC"
    buffer: "PER"
    environment: "BipedalWalker"
    obs_type: "vector"

run_config:
  max_time_s: 36000

hyper_parameters:
  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentPrioritizedReplayBuffer

  # Resource
  num_workers: 4
  num_envs_per_worker: 5
