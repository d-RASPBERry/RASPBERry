# SAC-PER: Atari-Breakout (Image observation)
extends: ../../../templates/sac_image_base.yml

env_config:
  env_name: "Atari-Breakout"
  env_alias: "SAC-PER-Breakout"

logging:
  log_subdir: "Atari/Breakout"

mlflow:
  experiment: "SAC-Breakout"
  tags:
    algorithm: "SAC"
    buffer: "PER"
    environment: "Breakout"
    obs_type: "image"

run_config:
  max_time_s: 1800

hyper_parameters:
  train_batch_size: 512
  grad_clip: 1.0
  n_step: 3
  rollout_fragment_length: 8
  initial_alpha: 0.05
  optimization:
    actor_learning_rate: 0.0001
    critic_learning_rate: 0.0001
    entropy_learning_rate: 0.0001

  min_sample_timesteps_per_iteration: 15000
  training_intensity: 3.0
  target_entropy: -3.0

  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentPrioritizedReplayBuffer

  # Resource
  num_workers: 5
  num_cpus: 8
  num_envs_per_worker: 8
