# SAC-PER: GYM-Walker2d-v4 (Vector observation, MuJoCo)
extends: ../../../templates/sac_vector_base.yml

env_config:
  env_name: "GYM-Walker2d"
  env_alias: "SAC-PER-Walker2d"

logging:
  log_subdir: "MuJoCo/Walker2d"

mlflow:
  experiment: "SAC-Walker2d"
  tags:
    algorithm: "SAC"
    buffer: "PER"
    environment: "Walker2d"
    obs_type: "vector"

run_config:
  max_time_s: 86400

hyper_parameters:
  train_batch_size: 512
  min_sample_timesteps_per_iteration: 2000
  training_intensity: 2.0

  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 5000000
    type: MultiAgentPrioritizedReplayBuffer

  # Resource
  num_workers: 6
  num_envs_per_worker: 8