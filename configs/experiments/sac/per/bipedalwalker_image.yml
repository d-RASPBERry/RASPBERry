# SAC-PER: BOX2DI-BipedalWalker-v3 (Image observation)
extends: ../../../templates/sac_image_base.yml

env_config:
  env_name: "BOX2DI-BipedalWalker-v3"
  env_alias: "SAC-PER-BipedalWalker-Image"
  img_size: 84
  frame_skip: 1 # Continuous control: avoid aggressive action-repeat for stability
  frame_stack: 4
  grayscale: true
  normalize: true
  reward_scale: 1.0 # Keep native reward magnitude for SAC (avoid entropy dominating)

logging:
  log_subdir: "BOX2DI/BipedalWalker-Image"

mlflow:
  experiment: "SAC-BipedalWalker-Image"
  tags:
    algorithm: "SAC"
    buffer: "PER"
    environment: "BipedalWalker"
    obs_type: "image"

run_config:
  max_time_s: 1800

hyper_parameters:
  # Optimized for Image-based Continuous Control
  train_batch_size: 256
  grad_clip: 1.0
  n_step: 1
  rollout_fragment_length: 4
  
  # Optimization
  initial_alpha: 0.2
  optimization:
    actor_learning_rate: 0.0003
    critic_learning_rate: 0.0003
    entropy_learning_rate: 0.0003

  # Sampling & Training
  min_sample_timesteps_per_iteration: 8000
  num_steps_sampled_before_learning_starts: 20000
  training_intensity: 1.0
  target_entropy: auto

  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 500000
    type: MultiAgentPrioritizedReplayBuffer

  # Resource
  num_workers: 6
  num_cpus: 8
  num_envs_per_worker: 4

