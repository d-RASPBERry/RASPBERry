# SAC-PER: Pendulum-Pendulum (Image observation)
extends: ../../../templates/sac_image_base.yml

env_config:
  env_name: "Pendulum-Pendulum"
  env_alias: "SAC-PER-Pendulum"

logging:
  log_subdir: "Pendulum/Pendulum"

mlflow:
  experiment: "SAC-Pendulum"
  tags:
    algorithm: "SAC"
    buffer: "PER"
    environment: "Pendulum"
    obs_type: "image"

run_config:
  max_time_s: 360000

hyper_parameters:
  train_batch_size: 64
  min_sample_timesteps_per_iteration: 2000
  training_intensity: 1.0

  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 600000
    type: MultiAgentPrioritizedReplayBuffer

  # Resource
  num_workers: 3
  num_envs_per_worker: 8