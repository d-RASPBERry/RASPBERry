# SAC-PER: MUJOCOI-HalfCheetah (Image observation)
extends: ../../../templates/sac_image_base.yml

env_config:
  env_name: "MUJOCOI-HalfCheetah-v4"
  env_alias: "SAC-PER-HalfCheetah-Image"
  img_size: 84
  frame_skip: 4
  frame_stack: 4
  grayscale: true
  normalize: true

logging:
  log_subdir: "MuJoCo/HalfCheetah-Image"

mlflow:
  experiment: "SAC-HalfCheetah-Image"
  tags:
    algorithm: "SAC"
    buffer: "PER"
    environment: "HalfCheetah"
    obs_type: "image"

run_config:
  max_time_s: 180000

hyper_parameters:
  # Optimized for Image-based Continuous Control
  train_batch_size: 256
  grad_clip: 1.0
  n_step: 3
  rollout_fragment_length: 4
  
  # Optimization
  initial_alpha: 0.2
  optimization:
    actor_learning_rate: 0.0003
    critic_learning_rate: 0.0003
    entropy_learning_rate: 0.0003

  # Sampling & Training
  min_sample_timesteps_per_iteration: 8000
  training_intensity: 4.0
  target_entropy: auto

  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 500000
    type: MultiAgentPrioritizedReplayBuffer

  # Resource
  num_workers: 6
  num_cpus: 8
  num_envs_per_worker: 4
