# SAC-PER: MUJOCO-HalfCheetah (Vector observation)
extends: ../../../templates/sac_vector_base.yml

env_config:
  env_name: "MUJOCO-HalfCheetah-v4"
  env_alias: "SAC-PER-HalfCheetah"

logging:
  log_subdir: "MuJoCo/HalfCheetah"

mlflow:
  experiment: "SAC-HalfCheetah"
  tags:
    algorithm: "SAC"
    buffer: "PER"
    environment: "HalfCheetah"
    obs_type: "vector"

run_config:
  max_time_s: 144000

hyper_parameters:
  train_batch_size: 512
  min_sample_timesteps_per_iteration: 6000
  training_intensity: 2.0

  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 2000000
    type: MultiAgentPrioritizedReplayBuffer

  # Resource
  num_workers: 6
  num_envs_per_worker: 6

