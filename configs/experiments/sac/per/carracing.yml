# SAC-PER: BOX2DI-CarRacing (Image observation)
extends: ../../../templates/sac_image_base.yml

env_config:
  env_name: "BOX2DI-CarRacing"
  env_alias: "SAC-PER-CarRacing"
  normalize: false
  dtype: "uint8"

logging:
  log_subdir: "BOX2DI/CarRacing"

mlflow:
  experiment: "SAC-CarRacing"
  tags:
    algorithm: "SAC"
    buffer: "PER"
    environment: "CarRacing"
    obs_type: "image"

run_config:
  max_time_s: 360000

hyper_parameters:
  train_batch_size: 1024
  grad_clip: 1.0
  n_step: 3
  rollout_fragment_length: 3
  initial_alpha: 0.05
  optimization:
    actor_learning_rate: 0.0001
    critic_learning_rate: 0.0001
    entropy_learning_rate: 0.0001

  min_sample_timesteps_per_iteration: 10000
  training_intensity: 3.0
  target_entropy: -3.0

  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 500000
    type: MultiAgentPrioritizedReplayBuffer

  # Resource
  num_workers: 9
  num_cpus: 10
  num_envs_per_worker: 8