# SAC-PER: BOX2DI-CarRacing (Image observation)
extends: ../../../templates/sac_image_base.yml

env_config:
  id: "BOX2DI-CarRacing-v2"
  env_alias: "SAC-PER-CarRacing"
  normalize: true
  # SKIP_INITIAL_FRAMES handled in utils/__init__.py

logging:
  log_subdir: "BOX2DI/CarRacing"

mlflow:
  experiment: "SAC-CarRacing"
  tags:
    algorithm: "SAC"
    buffer: "PER"
    environment: "CarRacing"
    obs_type: "image"

run_config:
  max_time_s: 600

hyper_parameters:
  # Optimized for Image-based Continuous Control
  train_batch_size: 256
  grad_clip: 1.0
  n_step: 3
  rollout_fragment_length: 8
  
  # Optimization
  initial_alpha: 0.2
  optimization:
    actor_learning_rate: 3.e-4
    critic_learning_rate: 3.e-4
    entropy_learning_rate: 3.e-4

  # Sampling & Training
  min_sample_timesteps_per_iteration: 10000
  training_intensity: 4.0
  target_entropy: auto

  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentPrioritizedReplayBuffer

  # Resource
  num_workers: 8
  num_cpus: 10
  num_envs_per_worker: 8
