# SAC-RASPBERry: MUJOCO-HalfCheetah (Vector observation)
extends: ../../../templates/sac_vector_base.yml

env_config:
  env_name: "MUJOCO-HalfCheetah-v4"
  env_alias: "SAC-RASPBERry-HalfCheetah"

logging:
  log_subdir: "MuJoCo/HalfCheetah"

mlflow:
  experiment: "SAC-HalfCheetah"
  tags:
    algorithm: "SAC"
    buffer: "RASPBERry"
    environment: "HalfCheetah"
    obs_type: "vector"

run_config:
  max_time_s: 144000

hyper_parameters:
  train_batch_size: 512
  min_sample_timesteps_per_iteration: 6000
  training_intensity: 2.0

  # Replay buffer (RASPBERry-specific)
  replay_buffer_config:
    capacity: 2000000
    type: MultiAgentRASPBERryReplayBuffer
    sub_buffer_size: 32
    compress_base: -1
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20

  # Resource
  num_workers: 6
  num_envs_per_worker: 6

