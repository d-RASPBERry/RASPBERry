# SAC-RASPBERry: BOX2DI-CarRacing (Image observation)
extends: ../../../templates/sac_image_base.yml

env_config:
  id: "BOX2DI-CarRacing-v2"
  env_alias: "SAC-RASPBERry-CarRacing"
  normalize: true
  # SKIP_INITIAL_FRAMES now handled in utils/__init__.py (set to 50 for CarRacing)
  # reset_skip_frames: 50 # Redundant, but explicit is good if we wanted to override

logging:
  log_subdir: "BOX2DI/CarRacing"

mlflow:
  experiment: "SAC-CarRacing"
  tags:
    algorithm: "SAC"
    buffer: "RASPBERry"
    environment: "CarRacing"
    obs_type: "image"

run_config:
  use_mlflow: true
  max_time_s: 360000

hyper_parameters:
  # Optimized for Image-based Continuous Control
  train_batch_size: 256
  grad_clip: 1.0
  n_step: 3
  rollout_fragment_length: 8
  
  # Optimization
  initial_alpha: 0.2
  optimization:
    actor_learning_rate: 3.e-4
    critic_learning_rate: 3.e-4
    entropy_learning_rate: 3.e-4

  # Sampling & Training
  min_sample_timesteps_per_iteration: 10000
  target_entropy: auto

  # Replay buffer (RASPBERry-specific)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentRASPBERryReplayBuffer
    sub_buffer_size: 16
    compress_base: -1
    worker_side_prioritization: true
    compress_pool_size: 400
    num_ray_workers: 4
    max_inflight_tasks: 16
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "C"
    chunk_size: 20

  # Resource
  num_workers: 8
  num_cpus: 10
  num_envs_per_worker: 8
