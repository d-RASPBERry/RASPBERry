# SAC-RASPBERry: BOX2DI-BipedalWalker (Image observation)
extends: ../../../templates/sac_image_base.yml

env_config:
  id: "BOX2DI-BipedalWalker-v3"
  env_alias: "SAC-RASPBERry-BipedalWalker-Image"
  img_size: 84
  frame_skip: 1 # Continuous control: avoid aggressive action-repeat for stability
  frame_stack: 4
  grayscale: true
  normalize: true
  reward_scale: 1.0 # Keep native reward magnitude for SAC (avoid entropy dominating)

logging:
  log_subdir: "BOX2DI/BipedalWalker-Image"

mlflow:
  experiment: "SAC-BipedalWalker"
  tags:
    algorithm: "SAC"
    buffer: "RASPBERry"
    environment: "BipedalWalker"
    obs_type: "image"

run_config:
  max_time_s: 600

hyper_parameters:
  # Optimized for Image-based Continuous Control
  train_batch_size: 256
  grad_clip: 1.0
  n_step: 1
  rollout_fragment_length: 8
  
  # Optimization
  initial_alpha: 0.2
  optimization:
    actor_learning_rate: 3.e-4
    critic_learning_rate: 3.e-4
    entropy_learning_rate: 3.e-4

  # Sampling & Training
  min_sample_timesteps_per_iteration: 8000
  num_steps_sampled_before_learning_starts: 50000
  training_intensity: 1.0
  target_entropy: auto

  # Replay buffer (RASPBERry-specific)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentRASPBERryReplayBuffer
    sub_buffer_size: 16
    compress_base: -1
    worker_side_prioritization: true
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20

  # Resource
  num_workers: 8
  num_cpus: 10
  num_envs_per_worker: 8

