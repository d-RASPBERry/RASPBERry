# SAC-RASPBERry: GYM-Walker2d-v4 (Vector observation, MuJoCo)
extends: ../../../templates/sac_vector_base.yml

env_config:
  env_name: "GYM-Walker2d"
  env_alias: "SAC-RASPBERry-Walker2d"

logging:
  log_subdir: "MuJoCo/Walker2d"

mlflow:
  experiment: "SAC-Walker2d"
  tags:
    algorithm: "SAC"
    buffer: "RASPBERry"
    environment: "Walker2d"
    obs_type: "vector"
    framework: "MuJoCo"

run_config:
  max_time_s: 86400

hyper_parameters:
  train_batch_size: 512
  min_sample_timesteps_per_iteration: 2000
  training_intensity: 2.0

  # Replay buffer (RASPBERry-specific)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 32
    compress_base: -1
    worker_side_prioritization: false
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20

  # Resource
  num_workers: 6
  num_envs_per_worker: 8