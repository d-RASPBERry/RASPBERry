# SAC-RASPBERry: BOX2DV-LunarLanderContinuous
# 只覆盖与 template 不同的配置参数
extends: ../../../templates/sac_vector_base.yml

env_config:
  env_name: "BOX2DV-LunarLanderContinuous"
  env_alias: "SAC-RASPBERry-LunarLander"

logging:
  log_subdir: "BOX2DV/LunarLander"
  # log_every 已在 template 定义，如需覆盖可在 runtime.yml 设置

mlflow:
  experiment: "SAC-LunarLander"
  tags:
    algorithm: "SAC"
    buffer: "RASPBERry"
    environment: "LunarLander"
    obs_type: "vector"

run_config:
  max_time_s: 14400  # 4小时

hyper_parameters:
  # 只覆盖 replay buffer 和资源配置（其他参数使用 template 默认值）
  
  # Replay buffer (RASPBERry-specific)
  replay_buffer_config:
    capacity: 100000
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16
    compress_base: -1
    worker_side_prioritization: false
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20
  
  # 资源配置（为4GPU并行实验降低资源占用）
  num_workers: 2
  num_envs_per_worker: 2
