# SAC-RASPBERry: BOX2DV-LunarLanderContinuous
extends: ../../../templates/sac_vector_base.yml

env_config:
  id: "BOX2DV-LunarLanderContinuous"
  env_alias: "SAC-RASPBERry-LunarLander"

logging:
  log_subdir: "BOX2DV/LunarLander"

mlflow:
  experiment: "SAC-LunarLander"
  tags:
    algorithm: "SAC"
    buffer: "RASPBERry"
    environment: "LunarLander"
    obs_type: "vector"

run_config:
  max_time_s: 600

hyper_parameters:
  train_batch_size: 512
  min_sample_timesteps_per_iteration: 2000
  training_intensity: 1.0

  # Replay buffer (RASPBERry-specific)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentRASPBERryReplayBuffer
    sub_buffer_size: 16
    compress_base: -1
    worker_side_prioritization: true
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20

  # Resource
  num_workers: 8
  num_envs_per_worker: 8