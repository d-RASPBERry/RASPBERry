# SAC-RASPBERry: BOX2DV-BipedalWalker (Vector observation)
extends: ../../../templates/sac_vector_base.yml

env_config:
  env_name: "BOX2DV-BipedalWalker"
  env_alias: "SAC-RASPBERry-BipedalWalker"

logging:
  log_subdir: "BOX2DV/BipedalWalker"

mlflow:
  experiment: "SAC-BipedalWalker"
  tags:
    algorithm: "SAC"
    buffer: "RASPBERry"
    environment: "BipedalWalker"
    obs_type: "vector"

run_config:
  max_time_s: 72000

hyper_parameters:
  train_batch_size: 512
  min_sample_timesteps_per_iteration: 4000
  training_intensity: 4.0

  # Replay buffer (RASPBERry-specific)
  replay_buffer_config:
    capacity: 5000000
    type: MultiAgentRASPBERryReplayBuffer
    sub_buffer_size: 16
    compress_base: -1
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20

  # Resource
  num_workers: 6
  num_envs_per_worker: 8