# SAC-RASPBERry: Atari-Breakout (Image observation)
# 仅覆盖与 template 不同的配置参数
extends: ../../../templates/sac_image_base.yml

env_config:
  id: "Atari-BreakoutNoFrameskip-v4"
  env_alias: "SAC-RASPBERry-Breakout"

logging:
  log_subdir: "Atari/Breakout"

mlflow:
  experiment: "SAC-Atari-Breakout"
  tags:
    algorithm: "SAC"
    buffer: "RASPBERry"
    environment: "Breakout"
    obs_type: "image"

run_config:
  max_time_s: 600

hyper_parameters:
  train_batch_size: 512
  grad_clip: 1.0
  n_step: 3
  rollout_fragment_length: 8
  initial_alpha: 0.05
  lr: 1.e-4
  optimization:
    actor_learning_rate: 1.e-4
    critic_learning_rate: 1.e-4
    entropy_learning_rate: 1.e-4

  min_sample_timesteps_per_iteration: 15000
  training_intensity: 1.0
  target_entropy: auto

  # Replay buffer (RASPBERry-specific)
  replay_buffer_config:
    capacity: 1000000
    type: MultiAgentRASPBERryReplayBuffer
    sub_buffer_size: 16
    compress_base: -1
    worker_side_prioritization: true
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20

  # Resource
  num_workers: 8
  num_cpus: 10
  num_envs_per_worker: 8
