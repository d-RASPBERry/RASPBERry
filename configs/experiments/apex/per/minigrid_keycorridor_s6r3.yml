# APEX-PER: MiniGrid-KeyCorridorS6R3
extends: ../../../templates/apex_base.yml

env_config:
  id: "MiniGrid-KeyCorridorS6R3-v0"
  env_alias: "APEX-PER-MiniGrid-KeyCorridorS6R3"
  tile_size: 10
  img_size: 84
  max_steps: 200

logging:
  log_subdir: "MiniGrid/KeyCorridorS6R3"
  log_every: 10

mlflow:
  experiment: "APEX-MiniGrid"
  tags:
    algorithm: "APEX-DQN"
    buffer: "PER"
    environment: "MiniGrid-KeyCorridorS6R3"
    obs_type: "image"

run_config:
  use_mlflow: true
  run_name_template: "{env_alias}"
  max_iterations: 100000
  max_time_s: 360000

hyper_parameters:
  training_intensity: 4.0
  # Replay buffer (PER)
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentPrioritizedReplayBuffer
    replay_buffer_shards_colocated_with_driver: true
    worker_side_prioritization: true
    no_local_replay_buffer: true
