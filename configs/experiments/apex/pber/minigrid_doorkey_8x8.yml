# APEX-PBER: MiniGrid-DoorKey-8x8
extends: ../../../templates/apex_base.yml

env_config:
  id: "MiniGrid-DoorKey-8x8-v0"
  env_alias: "APEX-PBER-MiniGrid-DoorKey-8x8"
  tile_size: 10
  img_size: 84
  max_steps: 200

logging:
  log_subdir: "MiniGrid/DoorKey-8x8"
  log_every: 10

mlflow:
  experiment: "APEX-DDQN-MiniGrid-DoorKey-8x8"
  tags:
    algorithm: "APEX-DQN"
    buffer: "PBER"
    environment: "MiniGrid-DoorKey-8x8"
    obs_type: "image"

run_config:
  use_mlflow: true
  run_name_template: "{env_alias}"
  max_iterations: 100000
  max_time_s: 360000

hyper_parameters:
  training_intensity: 1.0
  # Replay buffer (PBER)
  train_batch_size: 32
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentPrioritizedBlockReplayBuffer
    replay_buffer_shards_colocated_with_driver: true
    worker_side_prioritization: true
    no_local_replay_buffer: true
    sub_buffer_size: 16
