# APEX-RASPBERry: Freeway
extends: ../../../templates/apex_base.yml

env_config:
  id: "Atari-FreewayNoFrameskip-v4"
  env_alias: "APEX-RASPBERry-Freeway"

logging:
  log_subdir: "Atari/Freeway"
  log_every: 10

mlflow:
  experiment: "APEX-DDQN-Atari-Freeway"
  tags:
    algorithm: "APEX-DQN"
    buffer: "RASPBERry"
    environment: "Freeway"
    obs_type: "image"

run_config:
  use_mlflow: true
  run_name_template: "{env_alias}"
  max_iterations: 100000
  max_time_s: 360000

hyper_parameters:
  training_intensity: 1.0
  max_requests_in_flight_per_replay_worker: 8
  # Replay buffer (RASPBERry)
  train_batch_size: 32
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentRASPBERryReplayBuffer
    replay_buffer_shards_colocated_with_driver: true
    worker_side_prioritization: true
    no_local_replay_buffer: true
    sub_buffer_size: 16
    compress_pool_size: 200
    num_ray_workers: 4
    max_inflight_tasks: 16
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "C"
    chunk_size: 20

