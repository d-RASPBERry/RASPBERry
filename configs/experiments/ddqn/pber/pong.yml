# DDQN-PBER: Atari-Pong
# Complete configuration for Pong environment with PBER (Block ER without compression)
extends: ../../../templates/ddqn_base.yml

env_config:
  env_name: "Atari-PongNoFrameskip-v4"
  env_alias: "DDQN-PBER-Pong"

logging:
  log_subdir: "Atari/Pong"
  log_every: 10

mlflow:
  experiment: "DDQN-Pong"
  tags:
    algorithm: "DDQN"
    buffer: "PBER"
    environment: "Pong"
    obs_type: "image"

run_config:
  use_mlflow: false
  run_name_template: "{env_alias}"
  max_iterations: 100000
  max_time_s: 1800

hyper_parameters:
  # Replay buffer (PBER - Block ER without compression)
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16
    worker_side_prioritization: false
  
  # Same hyperparameters as PER and RASPBERry for fair comparison
  lr: 0.0001
  gamma: 0.99
  num_workers: 4
  num_envs_per_worker: 1

