# DDQN-RASPBERry: Atari-Pong
# Complete configuration for Pong environment
extends: ../../../templates/ddqn_base.yml

env_config:
  id: "Atari-PongNoFrameskip-v4"
  env_alias: "DDQN-RASPBERry-Pong"

logging:
  log_subdir: "Atari/Pong"
  log_every: 10

mlflow:
  experiment: "DDQN-Atari-Pong"
  tags:
    algorithm: "DDQN"
    buffer: "RASPBERry"
    environment: "Atari-Pong"
    obs_type: "image"

run_config:
  use_mlflow: false
  run_name_template: "{env_alias}"
  max_iterations: 100000
  max_time_s: 1800

hyper_parameters:
  # Replay buffer (RASPBERry)
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentRASPBERryReplayBuffer
    sub_buffer_size: 8
    compress_base: -1
    worker_side_prioritization: true
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20
  
  training_intensity: 1.0
  # Atari-specific hyperparameters
  lr: 1.e-4
  gamma: 0.99
  num_workers: 2
  num_envs_per_worker: 8

