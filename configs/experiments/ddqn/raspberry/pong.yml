# DDQN-RASPBERry: Atari-Pong
# Complete configuration for Pong environment
extends: ../../../templates/ddqn_base.yml

env_config:
  env_name: "Atari-PongNoFrameskip-v4"
  env_alias: "DDQN-RASPBERry-Pong"

logging:
  log_subdir: "Atari/Pong"
  log_every: 10

mlflow:
  experiment: "DDQN-Pong"
  tags:
    algorithm: "DDQN"
    buffer: "RASPBERry"
    environment: "Pong"
    obs_type: "image"

run_config:
  use_mlflow: true
  run_name_template: "{env_alias}"
  max_iterations: 100000
  max_time_s: 3600

hyper_parameters:
  # Replay buffer (RASPBERry)
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentRASPBERryReplayBuffer
    sub_buffer_size: 16
    compress_base: -1
    worker_side_prioritization: false
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20
  
  # Atari-specific hyperparameters
  lr: 1e-4
  gamma: 0.99
  num_workers: 4
  num_envs_per_worker: 1

