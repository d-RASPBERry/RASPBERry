# DDQN-PER: MiniGrid-DoorKey-8x8
# Environment creation check (pure RGB image observations)
extends: ../../../templates/ddqn_base.yml

env_config:
  id: "MiniGrid-DoorKey-8x8-v0"
  env_alias: "DDQN-PER-MiniGrid-DoorKey-8x8"
  tile_size: 10
  img_size: 84
  max_steps: 200

logging:
  log_subdir: "MiniGrid/DoorKey-8x8"
  log_every: 10

mlflow:
  experiment: "DDQN-MiniGrid-DoorKey-8x8"
  tags:
    algorithm: "DDQN"
    buffer: "PER"
    environment: "MiniGrid-DoorKey-8x8"
    obs_type: "image"

run_config:
  use_mlflow: true
  run_name_template: "{env_alias}"
  max_iterations: 100000
  max_time_s: 360000

hyper_parameters:
  training_intensity: 4.0
  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentPrioritizedReplayBuffer
  
  # Keep core hyperparameters aligned with Pong baseline
  lr: 1.e-4
  gamma: 0.99
  num_workers: 2
  num_envs_per_worker: 8
