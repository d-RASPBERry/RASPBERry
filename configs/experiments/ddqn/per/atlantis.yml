# DDQN-PER: Atari-Atlantis
# Environment creation check (image observations)
extends: ../../../templates/ddqn_base.yml

env_config:
  id: "Atari-AtlantisNoFrameskip-v4"
  env_alias: "DDQN-PER-Atlantis"

logging:
  log_subdir: "Atari/Atlantis"
  log_every: 10

mlflow:
  experiment: "DDQN-Atari-Atlantis"
  tags:
    algorithm: "DDQN"
    buffer: "PER"
    environment: "Atlantis"
    obs_type: "image"

run_config:
  use_mlflow: true
  run_name_template: "{env_alias}"
  max_iterations: 100000
  max_time_s: 360000

hyper_parameters:
  training_intensity: 4.0
  # Replay buffer (PER baseline)
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentPrioritizedReplayBuffer
  
  # Keep core hyperparameters aligned with Pong baseline
  lr: 1.e-4
  gamma: 0.99
  num_workers: 2
  num_envs_per_worker: 8
