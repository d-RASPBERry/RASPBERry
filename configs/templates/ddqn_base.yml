hyper_parameters:
  # Framework configuration
  framework: torch

  # Core parameters
  lr: 6.25e-05
  gamma: 0.99
  double_q: true
  dueling: false
  n_step: 3
  noisy: false
  num_atoms: 1
  adam_epsilon: 0.00015

  # Network architecture
  hiddens: [512]

  # Adam optimizer

  # Target network updates
  target_network_update_freq: 10000

  # Learning schedule
  num_steps_sampled_before_learning_starts: 20000
  min_sample_timesteps_per_iteration: 5000

  # Exploration parameters
  final_epsilon: 0.01
  epsilon_timesteps: 1000000

  # Training batch
  train_batch_size: 32
  rollout_fragment_length: 4

  # Resource configuration
  num_gpus: 1
  num_cpus: 10
  num_envs_per_worker: 20
  num_gpus_per_worker: 0.01
  num_cpus_per_worker: 1

  # DQN replay optimizer settings
  optimizer:
    num_replay_buffer_shards: 1
    async_replay_optimizer: False

# Default run configuration (can be overridden in experiment configs)
run_config:
  max_iterations: 100000  # Large enough to let max_time_s control
  max_time_s: 3600
