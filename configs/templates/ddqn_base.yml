hyper_parameters:
  # Framework configuration
  framework: torch

  # Core parameters
  lr: 6.25e-05
  gamma: 0.99
  double_q: true
  dueling: false
  n_step: 3
  noisy: false
  num_atoms: 1
  adam_epsilon: 0.00015

  # Network architecture
  hiddens: [512]

  # Adam optimizer

  # Target network updates
  target_network_update_freq: 10000

  # Learning schedule
  num_steps_sampled_before_learning_starts: 50000
  min_sample_timesteps_per_iteration: 5000
  training_intensity: 4.0

  # Exploration parameters
  final_epsilon: 0.01
  epsilon_timesteps: 1000000

  # Training batch
  train_batch_size: 32
  rollout_fragment_length: 8

  # Resource configuration
  num_gpus: 1
  num_cpus: 4
  num_workers: 2
  num_envs_per_worker: 8
  num_gpus_per_worker: 0.01
  num_cpus_per_worker: 1

  # Replay buffer defaults (merged into derived configs)
  replay_buffer_config:
    no_local_replay_buffer: false
    sub_buffer_size: 8
    worker_side_prioritization: true

  # DQN replay optimizer settings
  optimizer:
    num_replay_buffer_shards: 1
    async_replay_optimizer: false

# Default run configuration (can be overridden in experiment configs)
run_config:
  use_mlflow: true
  max_iterations: 100000  # Large enough to let max_time_s control
  max_time_s: 360000

# Logging strategy
logging_config:
  log_freq: 10
  checkpoint_freq: 50
  log_start_iteration: 20
