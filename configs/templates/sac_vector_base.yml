# SAC Vector Base Template
# Note: Path and Ray configurations are now in runtime.yml

hyper_parameters:
  # Framework configuration
  framework: torch

  # Model configuration for VECTOR inputs (no custom model, use RLlib default MLP)
  model:
    fcnet_hiddens: [256, 128]        # MLP hidden layers
    fcnet_activation: relu
    vf_share_layers: false           # Separate value function network

  # Core SAC parameters (tuned for continuous control)
  lr: 3.e-4
  gamma: 0.99
  tau: 0.005                         # Soft target update coefficient
  target_entropy: auto               # Auto-tune based on action space
  initial_alpha: 1.0                 # Higher initial temperature for exploration
  n_step: 1

  # Learning schedule
  num_steps_sampled_before_learning_starts: 50000
  min_sample_timesteps_per_iteration: 1000
  training_intensity: 4.0

  # Training batch configuration
  train_batch_size: 256
  rollout_fragment_length: 8

  # Resource configuration
  num_gpus: 1
  num_cpus: 10
  num_workers: 8
  num_envs_per_worker: 8
  num_gpus_per_worker: 0.01
  num_cpus_per_worker: 1

  # Common replay buffer parameters
  replay_buffer_config:
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    no_local_replay_buffer: false
    sub_buffer_size: 16
    worker_side_prioritization: true

# Run configuration
run_config:
  use_mlflow: true
  max_iterations: 100000  # Large enough to let max_time_s control
  max_time_s: 360000

# Logging strategy
logging_config:
  log_freq: 10
  checkpoint_freq: 50
  log_start_iteration: 20

