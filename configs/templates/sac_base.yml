# Basic path configuration
paths:
  log_path: "logs"
  checkpoint_path: "checkpoints"

hyper_parameters:
  # Framework configuration
  framework: torch

  # Core SAC parameters
  lr: 3e-4
  gamma: 0.99
  tau: 0.005                       # Soft target update coefficient
  target_entropy: "auto"           # Auto-compute target entropy
  initial_alpha: 1.0               # Initial temperature coefficient
  n_step: 1

  # Network architecture
  hiddens: [256, 256]              # SAC typically uses deeper networks

  # Learning schedule
  num_steps_sampled_before_learning_starts: 10000
  min_sample_timesteps_per_iteration: 1000

  # Training batch configuration
  train_batch_size: 1024           # Larger batch to better utilize GPU
  rollout_fragment_length: 32      # Longer fragments reduce RPC/serialization overhead

  # Resource configuration
  num_gpus: 1
  num_cpus: 10
  num_workers: 6                   # Increase parallel sampling
  num_envs_per_worker: 20
  num_gpus_per_worker: 0.01
  num_cpus_per_worker: 2

# Logging strategy
log_freq: 10
checkpoint_freq: 100