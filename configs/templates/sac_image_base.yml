# SAC Image Base Template
# Note: Path and Ray configurations are now in runtime.yml

hyper_parameters:
  # Framework configuration
  framework: torch

  # Model configuration for image inputs
  # SACLightweightCNN now properly inherits from SACTorchModel
  model:
    custom_model: SACLightweightCNN
    custom_model_config:
      feature_dim: 128              # Feature dimension after CNN encoder

  # Core SAC parameters (tuned for Pendulum)
  lr: 3.e-4
  gamma: 0.99
  tau: 0.005                        # Soft target update coefficient
  target_entropy: auto              # SAC-only: auto-tune based on action space
  initial_alpha: 0.2                # Lower initial temperature for image-based learning
  n_step: 1

  # Network architecture
  hiddens: [64, 64]                # Applied to CNN features

  # Learning schedule (faster warmup for image-based learning)
  num_steps_sampled_before_learning_starts: 50000
  min_sample_timesteps_per_iteration: 1000
  training_intensity: 4.0

  # Training batch configuration
  train_batch_size: 64
  rollout_fragment_length: 8

  # Resource configuration (aligned with sac_vector_base.yml)
  num_gpus: 1
  num_cpus: 10
  num_workers: 8         # Fixed across SAC runs
  num_envs_per_worker: 8 # Adjusted for throughput with fewer workers
  num_gpus_per_worker: 0.01  # Reduced GPU allocation per worker
  num_cpus_per_worker: 1

  # Common replay buffer parameters (overridden in specific configs)
  replay_buffer_config:
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    no_local_replay_buffer: false
    sub_buffer_size: 16
    worker_side_prioritization: true

# Run configuration
run_config:
  use_mlflow: false
  max_iterations: 100000  # Large enough to let max_time_s control
  max_time_s: 1800
  # Note: run_name is dynamically generated in runner scripts (SAC-PER-{timestamp})

# Logging strategy
logging_config:
  log_freq: 10
  checkpoint_freq: 50
  log_start_iteration: 20