# SAC-PBER configuration for VECTOR observation environments
# (Pendulum, LunarLander, etc.)
# Pure block-level replay WITHOUT compression
extends: templates/sac_vector_base.yml

hyper_parameters:
  training_intensity: 1.0
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16
    worker_side_prioritization: true

