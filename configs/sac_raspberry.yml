# Inherit base configuration
extends: templates/sac_base.yml

hyper_parameters:
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 32
    compress_base: -1
    worker_side_prioritization: false
    compress_pool_size: 400
    compression_algorithm: "lz4"  # Options: zstd, lz4, lz4hc, blosclz
    compression_level: 1           # 1-9, higher = better compression but slower
    compression_nthreads: 4
    compression_mode: "D"          # "A": sync, "B": batch_pool, "D": batch_async
    chunk_size: 20                 # Batch size for modes B and D (shared parameter)