# SAC-PBER configuration for IMAGE observation environments
# (Atari, MiniGrid, Pendulum, CarRacing)
# Pure block-level replay WITHOUT compression (Chapter 3: PBER)
extends: templates/sac_image_base.yml

hyper_parameters:
  replay_buffer_config:
    # Standard PER parameters
    capacity: 100000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    worker_side_prioritization: false
    
    # PBER-specific parameters
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 16  # Transitions per block

