# Inherit base configuration
extends: templates/ddqn_base.yml

hyper_parameters:
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentPrioritizedBlockReplayBuffer
    sub_buffer_size: 8
    compress_base: -1
    worker_side_prioritization: false
    compress_pool_size: 100
    # Options: zstd, lz4, lz4hc, blosclz
    compression_algorithm: "lz4"
    # 1-9, higher = better compression but slower
    compression_level: 1
    compression_nthreads: 4
    # "A": sync, "B": batch_pool, "D": batch_async
    compression_mode: "D"
    # Batch size for modes B and D (shared parameter)
    chunk_size: 20
  num_cpus: 5
  num_gpus: 1
