# DDQN-RASPBERry configuration for Atari environments
extends: templates/ddqn_base.yml

hyper_parameters:
  replay_buffer_config:
    capacity: 1000000
    prioritized_replay_alpha: 0.5
    prioritized_replay_beta: 1.0
    prioritized_replay_eps: 0.000001
    type: MultiAgentRASPBERryReplayBuffer
    worker_side_prioritization: true
    sub_buffer_size: 8
    compress_base: -1
    compress_pool_size: 100
    # Options: zstd, lz4, lz4hc, blosclz
    compression_algorithm: "lz4"
    # 1-9, higher = better compression but slower
    compression_level: 1
    compression_nthreads: 4
    # "A": sync, "B": batch_pool, "D": batch_async
    compression_mode: "D"
    # Batch size for modes B and D (shared parameter)
    chunk_size: 20

  training_intensity: 1.0
  num_cpus: 4
  num_gpus: 1

mlflow:
  experiment: "DDQN-Atari"
  tags:
    algorithm: "DDQN"
    buffer: "RASPBERry"
    obs_type: "image"


run_config:
  # Keep iterations high so time-based runs (e.g., timeout 30m) don't stop early.
  use_mlflow: false
  max_iterations: 100000
  max_time_s: 1800


