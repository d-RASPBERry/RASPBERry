# SAC-RASPBERry configuration for VECTOR observation environments
# (LunarLanderContinuous, BipedalWalker)
extends: templates/sac_vector_base.yml

hyper_parameters:
  replay_buffer_config:
    capacity: 100000
    prioritized_replay_alpha: 0.6
    prioritized_replay_beta: 0.4
    prioritized_replay_eps: 0.000001
    type: MultiAgentRASPBERryReplayBuffer
    sub_buffer_size: 16
    compress_base: -1
    worker_side_prioritization: false
    compress_pool_size: 400
    compression_algorithm: "lz4"
    compression_level: 1
    compression_nthreads: 4
    compression_mode: "D"
    chunk_size: 20

