name: RASPBERRY
channels:
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      # ===== PyTorch stack (keep as in your raspberry env) =====
      - torch==2.6.0+cu124
      - torchvision==0.21.0+cu124
      - torchaudio==2.6.0+cu124
      # ===== RL/runtime libs =====
      - ray[all]==2.8.0
      - ale-py==0.8.1
      - blosc==1.11.3
      - mlflow
      # Install Gym to match good env behavior for Atari wrappers
      - gym==0.23.0
      - gym-notices==0.0.7
      - gymnasium==0.28.1
      - gymnasium[atari]==0.28.1
      - gymnasium[accept-rom-license]
      - gymnasium[box2d]
      # Envs
      - minigrid==2.0.0
      # ===== Core numerics =====
      - numpy==1.24.3
      - scipy==1.9.3
      - pyyaml
      # ===== Imaging stack (match good env) =====
      - pillow==9.3.0
      - opencv-python==4.6.0.66
      - imageio==2.25.1